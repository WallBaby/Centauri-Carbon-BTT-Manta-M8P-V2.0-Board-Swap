[mcu eddy]
#FOR USB: replace this with your serial port ID
#FOR CANBUS: replace this with your canbus UUID
#serial: /dev/serial/by-id/usb-Klipper_rp2040_5044340310A9D51C-if00
canbus_uuid: f28c06e8bcac
restart_method: command

[probe_eddy_current btt_eddy] #[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -23.076 #IF USING CLOGGED NOZZLE TOOLHEAD COVER https://www.printables.com/model/1575497-another-centauri-carbon-toolhead-cover
y_offset: -24.767 #IF USING CLOGGED NOZZLE TOOLHEAD COVER https://www.printables.com/model/1575497-another-centauri-carbon-toolhead-cover

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

#Uncomment this if you are using Eddy as the probe AND the homing endstop
[safe_z_home]
home_xy_position: 128, 128 # Choose an X,Y position that is in the center of your bed. For a 300x300 machine that will be 150, 150. Use the same principle to calculate your bed center.
z_hop: 10
z_hop_speed: 25
speed: 200

# Uncomment this if you are using Eddy as the probe AND the homing endstop
[force_move]
enable_force_move: True #Allows a user to move the z axis down if they have no other means of homing Z and need to calibrate the Eddy.
